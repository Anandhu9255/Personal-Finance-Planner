<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<header class="dashboard-header">
  <h1>Budget Tracker</h1>
  <div class="month-selector">
    <label for="mymonth">Select month:</label>
    <input type="month" id="mymonth" value="2026-01" />
  </div>
</header>

<!-- TOP STATS -->
<div class="top-stats-row">
  <div class="stat-card">
    <label>Budget Amount</label>
    <input type="number" id="budgetInput" placeholder="₹0.00" />
  </div>

  <div class="stat-card">
    <label>Total Spent</label>
    <p class="amount amountTS">₹0.00</p>
  </div>

  <div class="stat-card">
    <label>Remaining Balance</label>
    <p class="amount amountRB">₹0.00</p>
  </div>
</div>

<!-- BREAKDOWN -->
<div class="breakdown-card">
  <h3>Spending Breakdown</h3>
  <div id="breakdownContainer"></div>
</div>

<!-- WARNING -->
<div class="warningDiv"></div>

<!-- ADD EXPENSE -->
<div class="add-Expense-card">
  <h2>Add Expense</h2>

  <div class="input-row">
    <input type="number" id="amountInput" placeholder="Amount" />
<select id="categoryInput">
  <option value="">Select</option>

  <!-- Food & Home -->
  <option value="Food">Food / Eating Out</option>
  <option value="Groceries">Groceries</option>
  <option value="Household Supplies">Household Supplies</option>
  <option value="Electricity Bill">Electricity Bill</option>
  <option value="Water Bill">Water Bill</option>
  <option value="Gas / Cooking Gas">Gas / Cooking Gas</option>
  <option value="Rent">Rent</option>

  <!-- Health -->
  <option value="Hospital">Hospital</option>
  <option value="Medicine">Medicine / Pharmacy</option>
  <option value="Gym / Fitness">Gym / Fitness</option>
  <option value="Salon / Haircut">Salon / Haircut</option>

  <!-- Transport -->
  <option value="Petrol">Petrol</option>
  <option value="Auto / Cab">Auto / Cab</option>
  <option value="Travel">Travel</option>
  <option value="Vehicle Maintenance">Vehicle Maintenance</option>
  <option value="Parking / Toll">Parking / Toll</option>

  <!-- Finance -->
  <option value="EMI / Loan">EMI / Loan Payment</option>
  <option value="Insurance">Insurance</option>
  <option value="Investment">Investment / Mutual Funds</option>
  <option value="Savings">Savings</option>

  <!-- Digital & Work -->
  <option value="Recharge">Recharge</option>
  <option value="Subscriptions">Subscriptions</option>
  <option value="Online Shopping">Online Shopping</option>
  <option value="Work / Office">Work / Office Expenses</option>

  <!-- Lifestyle -->
  <option value="Theatre / Cinema">Theatre / Cinema</option>
  <option value="Gifts / Donations">Gifts / Donations</option>
  <option value="Party / Events">Party / Events</option>

  <!-- Education -->
  <option value="Education">Education</option>
  <option value="School Fees">School Fees</option>

  <option value="Others">Others</option>
</select>
    <input type="date" id="dateInput" />
    <input type="text" id="noteInput" placeholder="Note" />
  </div>

  <button id="addExpenseBtn">+ Add Expense</button>
</div>

<!-- RECENT EXPENSES -->
<div class="recent-expense-card">
  <div class="recent-expense-header">
    <h2>Recent Expenses</h2>
    <button class="clear-all-btn">Clear All</button>
  </div>

  <div class="recent-expense-headings">
    <span>Date</span>
    <span>Category</span>
    <span>Note</span>
    <span>Amount</span>
    <span>Actions</span>
  </div>

  <div id="recentExpenseContainer"></div>
</div>

<script src="scripts.js"></script>
</body>
</html>
